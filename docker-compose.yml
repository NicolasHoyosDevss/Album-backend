services:
  frontend:
    build:
      context: ../Album-frontend
      dockerfile: Dockerfile
    env_file:
      - ../Album-frontend/.env.docker
    environment:
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
    ports:
      - "5173:5173"
    volumes:
      - ../Album-frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    command: npm run dev:docker

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      DB_HOST: database
      DB_PORT: 5432
      DB_USER: album_user
      DB_PASSWORD: album_password
      DB_NAME: album_db
      DB_SSL: "false"
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      database:
        condition: service_healthy

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: album_user
      POSTGRES_PASSWORD: album_password
      POSTGRES_DB: album_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U album_user -d album_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  frontend_node_modules:
  postgres_data:
